server:
  port: 8085

spring:
  application:
    name: reporting-service
  datasource:
    url: jdbc:postgresql://localhost:5437/reporting_db
    username: reporting_user
    password: reporting_pass
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info
