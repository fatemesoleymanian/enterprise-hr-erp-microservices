server:
  port: 8085

spring:
  application:
    name: reporting-service
  datasource:
    url: jdbc:postgresql://localhost:5437/reporting_db
    username: reporting_user
    password: reporting_pass
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: reporting-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

reporting:
  kafka:
    topics:
      department: department.events
      employee: employee.events
      attendance: attendance.events

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info
